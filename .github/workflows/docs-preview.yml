name: Docs Preview

on:
  pull_request_target:
    branches:
      - main
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: docs-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      # pull_request_target runs in the base repo context for write access,
      # but we need to build the PR's code, not the base branch.
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Build docs
        env:
          BASE_PATH: /threlte/previews/pr-${{ github.event.pull_request.number }}
        run: pnpm run build:docs

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy preview
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf previews/pr-${{ github.event.pull_request.number }}
          mkdir -p previews/pr-${{ github.event.pull_request.number }}
          cp -r ../apps/docs/dist/* previews/pr-${{ github.event.pull_request.number }}/

          git add -A
          git diff --staged --quiet || git commit -m "Deploy preview for PR #${{ github.event.pull_request.number }}"
          git pull --rebase
          git push

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            // TODO: Update to https://threlte.xyz once the custom domain is linked
            const previewUrl = `https://${owner}.github.io/${repo}/previews/pr-${prNumber}/`;
            const body = `📖 Docs preview deployed to: ${previewUrl}\n\nLast updated: <relative-time datetime="${new Date().toISOString()}">${new Date().toISOString()}</relative-time>`;

            // Delete previous preview comment so the new one appears at the bottom
            const comments = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber
            });
            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Docs preview deployed')
            );
            if (existing) {
              await github.rest.issues.deleteComment({
                owner, repo, comment_id: existing.id
              });
            }

            await github.rest.issues.createComment({
              owner, repo, issue_number: prNumber, body
            });

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          rm -rf previews/pr-${{ github.event.pull_request.number }}

          git add -A
          git diff --staged --quiet || git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}"
          git pull --rebase
          git push
